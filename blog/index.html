<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Blog - Griffin Dalby</title>
    <!-- <link rel="stylesheet" href="/css/style.css"> -->
</head>
<body>
    <h1>Blog</h1>
    
    <ul class="blog-list">
    {% for post in site.posts %}
        <li>
            <a href="{{ post.url }}">{{ post.title }}</a>
            <time>{{ post.date | date: "%B %d, %Y" }}</time>
        </li>
    {% endfor %}
    </ul>
    
    <a href="/">← Back to home</a>
</body>
</html>
