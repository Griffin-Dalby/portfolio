<!DOCTYPE html>
<html>
<head>
    <title>Blog - Griffin Dalby</title>
    <link rel="stylesheet" href="../css/blog_index.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background-color: #151515;">
    <nav class="blog-nav">
        <a href="/" class="home-link">Home</a>
    </nav>
    <h1>Griffin's Blog</h1>

    <div id="posts"></div>
    
    <script>
        fetch('posts.json')
            .then(r => r.json())
            .then(posts => {
                const html = posts.map(p => `
                    <article class="post-container">
                        <h2><a href="post.html?file=${p.file}">${p.title}</a></h2>
                        <time>${p.date} • Griffin Dalby</time>
                        <p>${p.description}</p>
                    </article>
                `).join('');
                document.getElementById('posts').innerHTML = html;
            });
    </script>
</body>
</html>
